name: Deploy to EC2

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/asha-copilot
            git pull origin master
            # Ensure correct model ID in .env
            sed -i 's|BEDROCK_MODEL_ID=.*|BEDROCK_MODEL_ID=amazon.nova-pro-v1:0|' backend/.env
            python3.11 -m pip install -r backend/requirements.txt --quiet
            cd frontend && npm ci && npm run build
            sudo systemctl restart asha-backend
            sudo systemctl restart nginx
            echo "Deployed at $(date)"
